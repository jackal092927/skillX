name: Check Sensitive Info

on:
  pull_request:
  push:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scan tracked files for sensitive info
        run: python3 scripts/check_sensitive_info.py

      - name: Run scanner unit tests
        run: python3 -m unittest tests.test_check_sensitive_info
